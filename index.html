<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Beginning of Forever</title>
    <style>
        body {
            font-family: 'Garamond', serif;
            margin: 0;
            padding: 0;
            /* 背景画像を新しい名前 p1.jpg に設定したよ */
            background: linear-gradient(rgba(255,255,255,0.6), rgba(255,255,255,0.6)), 
                        url('p1.jpg'); 
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .floating-gallery {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none; opacity: 0.5;
        }
        .floating-img {
            position: absolute;
            width: 120px; bottom: -200px;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            animation: floatUp 20s linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(20deg); opacity: 0; }
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 4px;
            width: 80%; max-width: 400px;
            backdrop-filter: blur(5px);
            text-align: center;
        }
        h1 { color: #c5a059; letter-spacing: 2px; text-transform: uppercase; font-weight: 300; font-size: 1.5rem; margin-bottom: 15px; }
        p { color: #555; font-style: italic; line-height: 1.6; margin-bottom: 30px; font-size: 0.9rem; }
        .drive-link {
            display: inline-block; background-color: #c5a059; color: white;
            text-decoration: none; padding: 12px 25px; letter-spacing: 1px;
            text-transform: uppercase; font-size: 0.8rem; transition: 0.3s; border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="floating-gallery" id="bgGallery"></div>
    <div class="container">
        <h1>The Beginning of Forever</h1>
        <p>"A beautiful journey begins with a single step.<br>Relive the moments of the day you said 'Yes'."</p>
        <a href="https://photos.app.goo.gl/Fbo2ULNKXmz5D7GB7" target="_blank" class="drive-link">View & Download Photos</a>
    </div>

    <script>
        const bgGallery = document.getElementById('bgGallery');
        // i=1 から 10 まで、p1.jpg, p2.jpg... を読み込む魔法だよ
        for (let i = 1; i <= 10; i++) {
            const img = document.createElement('img');
            img.src = "p" + i + ".jpg"; 
            img.className = 'floating-img';
            img.style.left = Math.random() * 80 + '%';
            img.style.animationDelay = (i * 2) + 's';
            img.style.animationDuration = (Math.random() * 10 + 15) + 's';
            bgGallery.appendChild(img);
        }
    </script>
</body>
</html>
