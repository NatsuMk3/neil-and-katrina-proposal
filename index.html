<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Beginning of Forever</title>
    <style>
        /* 背景にメインの写真を1枚設定するよ */
        body {
            font-family: 'Garamond', serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), 
                        url('Photo (1).jpg'); /* ここを一番お気に入りの写真名に変えてね */
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* ふわふわ流れるギャラリーの魔法 */
        .floating-gallery {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.4;
        }

        .floating-img {
            position: absolute;
            width: 150px;
            bottom: -200px;
            animation: floatUp 20s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(20deg); opacity: 0; }
        }

        /* メインの白いカード */
        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 4px;
            width: 85%;
            max-width: 450px;
            backdrop-filter: blur(5px);
        }

        h1 { 
            color: #c5a059; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            font-weight: 300;
            font-size: 1.6rem; /* スマホ向けに少し小さくしたよ */
            margin-bottom: 15px;
        }

        p { 
            color: #555; 
            font-style: italic; 
            line-height: 1.6; 
            margin-bottom: 30px;
            font-size: 0.95rem; /* 読みやすいバランスに調整 */
        }

        .drive-link {
            display: inline-block;
            background-color: #c5a059;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        /* モバイル用の微調整 */
        @media (max-width: 600px) {
            h1 { font-size: 1.4rem; }
            p { font-size: 0.85rem; }
            .container { padding: 30px 20px; }
        }
    </style>
</head>
<body>

<div class="floating-gallery" id="bgGallery"></div>

<div class="container">
    <h1>The Beginning of Forever</h1>
    <p>
        "A beautiful journey begins with a single step.<br>
        Relive the moments of the day you said 'Yes'."
    </p>
    <a href="YOUR_GOOGLE_DRIVE_LINK_HERE" target="_blank" class="drive-link">View & Download Photos</a>
</div>

<script>
    // 背景で写真をふわふわさせるスクリプトだよ
    const bgGallery = document.getElementById('bgGallery');
    const totalPhotos = 15; // 背景に使う枚数。多すぎると重いから注意！

    for (let i = 1; i <= totalPhotos; i++) {
        const img = document.createElement('img');
        img.src = `Photo (${Math.floor(Math.random() * 87) + 1}).jpg`;
        img.className = 'floating-img';
        
        // ランダムな位置と速さを設定するよ
        img.style.left = Math.random() * 90 + '%';
        img.style.animationDelay = Math.random() * 15 + 's';
        img.style.animationDuration = (Math.random() * 10 + 15) + 's';
        
        bgGallery.appendChild(img);
    }
</script>

</body>
</html>
